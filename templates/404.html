{% extends "base.html" %}

{% block head_extra %}
<script>
    (function () {
        var location = window.location;
        var lowerPath = location.pathname.toLowerCase();
        if (location.pathname !== lowerPath) {
            location.replace(location.origin + lowerPath + location.search + location.hash);
        }
    })();
</script>
{% endblock head_extra %}

{% block content %}
<section class="container section not-found">
    <p class="not-found__code" aria-hidden="true">404</p>
    <h1 class="not-found__title">Page not found</h1>
    <p class="not-found__lead">
        That URL doesn&rsquo;t exist. Check the spelling, or head back to the home page.
    </p>
    <p class="not-found__actions">
        <a class="btn btn--primary" href="{{ get_url(path='/') }}">Back to home</a>

    </p>
</section>
{% endblock content %}
