{% set nav = load_data(path="data/nav.yaml") %}
<div class="scroll-nav-shell">
    <button
        type="button"
        class="scroll-nav__toggle"
        :class="navOpen ? 'scroll-nav__toggle--open' : 'scroll-nav__toggle--closed'"
        @click="navOpen = !navOpen"
        :aria-expanded="navOpen"
        aria-controls="scroll-nav-panel"
        aria-label="Toggle section navigation"
    >
        <svg class="scroll-nav__toggle-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>
    <div
        id="scroll-nav-panel"
        class="scroll-nav-drawer"
        :class="{ 'scroll-nav-drawer--open': navOpen }"
        :aria-hidden="!navOpen"
    >
        <header class="sidebar__header">
            <p class="sidebar__brand">{{ config.title }}</p>
            <p class="sidebar__meta">portfolio</p>
        </header>
        <nav class="scroll-nav" aria-label="On this page">
            <ol class="scroll-nav__list">
                {% for item in nav.sections %}
                <li class="scroll-nav__item">
                    <a class="scroll-nav__link" href="#{{ item.id }}" :tabindex="navOpen ? 0 : -1">
                        <span class="scroll-nav__label">{{ item.name }}</span>
                    </a>
                </li>
                {% endfor %}
            </ol>
        </nav>
    </div>
</div>
