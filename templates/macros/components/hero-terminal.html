<div
    class="hero-terminal"
    role="region"
    aria-label="Portfolio terminal preview"
>
    <div class="hero-terminal__chrome" aria-hidden="true">
        <span class="hero-terminal__dots">
            <span class="hero-terminal__dot hero-terminal__dot--close"></span>
            <span class="hero-terminal__dot hero-terminal__dot--minimize"></span>
            <span class="hero-terminal__dot hero-terminal__dot--maximize"></span>
        </span>
        <span class="hero-terminal__title">xingjobo@portfolio:~</span>
    </div>
    <div class="hero-terminal__body">
        <pre class="hero-terminal__output" aria-live="polite">Welcome to xingJobo portfolio.
Type commands here soon — for now, scroll down or try the buttons on the left.

$ ls
README.md  about.md  experience.md  projects.md  skills.md

$ <span class="hero-terminal__cursor" aria-hidden="true"></span></pre>
        <form class="hero-terminal__input-row" action="#" method="get" aria-hidden="true">
            <span class="hero-terminal__prompt" aria-hidden="true">$</span>
            <input
                class="hero-terminal__input"
                type="text"
                disabled
                placeholder="coming soon"
                aria-label="Terminal command"
                autocomplete="off"
                spellcheck="false"
            >
        </form>
    </div>
</div>
