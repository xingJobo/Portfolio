# Welcome text for README.md in fauxsh (see docs/architecture.md).

content: |
  Welcome, dear visitor.
  This portfolio offers a peek into my work and my journey through information technology.

  This terminal presents the portfolio in a way that feels familiar to developers.

  Supported commands:

    ls          list files in this directory
    cat         read a file
    help        list all commands
    clear       clear the screen

  Shortcuts:

    Tab         complete commands and filenames
    ↑ / ↓       browse command history

  Happy browsing!

  Try: ls — cat about.md — help
